<svg xmlns="http://www.w3.org/2000/svg" width="680" height="128" viewBox="0 0 680 128" role="img" aria-labelledby="title desc">
  <title id="title">SRI KRISHNA INVISIBLE GRILLS desktop logo</title>
  <desc id="desc">Sri Krishna Invisible Grills safety net style logo with circular mesh mark and bold wordmark.</desc>
  <defs>
    <linearGradient id="markBlue" x1="18" y1="14" x2="112" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b3f8f"/>
      <stop offset="0.62" stop-color="#007bff"/>
      <stop offset="1" stop-color="#08275a"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="48" y1="18" x2="120" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#ffc107"/>
    </linearGradient>
    <clipPath id="markClip">
      <circle cx="64" cy="64" r="47"/>
    </clipPath>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#08275a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#logoShadow)">
    <circle cx="64" cy="64" r="52" fill="#ffffff"/>
    <circle cx="64" cy="64" r="47" fill="url(#markBlue)"/>
    <g clip-path="url(#markClip)" opacity="0.42">
      <path d="M14 38h100M8 56h112M8 74h112M14 92h100" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <path d="M30 12v104M48 6v116M66 6v116M84 6v116M102 12v104" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <path d="M12 96 98 10M28 112 116 24M8 58 58 8M70 120 120 70" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
    </g>
    <circle cx="64" cy="64" r="47" fill="none" stroke="#ffffff" stroke-width="4"/>
    <path d="M93 91 109 75l8 8-24 24-15-15 8-8 7 7Z" fill="url(#goldAccent)" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
    <text x="64" y="74" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" letter-spacing="0">SK</text>
    <text x="64" y="94" text-anchor="middle" fill="#ffc107" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="900" letter-spacing="1.4">SAFETY</text>
  </g>

  <path d="M132 27v74" stroke="#ffc107" stroke-width="4" stroke-linecap="round"/>
  <text x="154" y="50" fill="#08275a" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="900" letter-spacing="0">SRI KRISHNA</text>
  <text x="154" y="80" fill="#007bff" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="900" letter-spacing="0">INVISIBLE GRILLS</text>
  <path d="M154 91h244" stroke="#ffc107" stroke-width="4" stroke-linecap="round"/>
  <text x="154" y="110" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="800" letter-spacing="2.5">BALCONY SAFETY NETS | CHENNAI</text>
