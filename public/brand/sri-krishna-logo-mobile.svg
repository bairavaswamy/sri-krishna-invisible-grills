<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">SRI KRISHNA INVISIBLE GRILLS mobile logo</title>
  <desc id="desc">Compact Sri Krishna safety net logo with circular mesh mark.</desc>
  <defs>
    <linearGradient id="mobileBlue" x1="24" y1="18" x2="136" y2="144" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b3f8f"/>
      <stop offset="0.62" stop-color="#007bff"/>
      <stop offset="1" stop-color="#08275a"/>
    </linearGradient>
    <linearGradient id="mobileGold" x1="88" y1="74" x2="134" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#ffc107"/>
    </linearGradient>
    <clipPath id="mobileClip">
      <circle cx="80" cy="74" r="55"/>
    </clipPath>
    <filter id="mobileShadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#08275a" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="160" height="160" rx="32" fill="#ffffff"/>
  <g filter="url(#mobileShadow)">
    <circle cx="80" cy="74" r="62" fill="#ffffff"/>
    <circle cx="80" cy="74" r="55" fill="url(#mobileBlue)"/>
    <g clip-path="url(#mobileClip)" opacity="0.42">
      <path d="M20 44h120M14 66h132M14 88h132M20 110h120" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <path d="M38 8v132M60 4v140M82 4v140M104 4v140M126 8v132" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <path d="M18 112 112 18M42 136 140 38M10 72 72 10M88 140 148 80" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round"/>
    </g>
    <circle cx="80" cy="74" r="55" fill="none" stroke="#ffffff" stroke-width="5"/>
    <path d="M107 101 126 82l9 9-28 28-18-18 9-9 9 9Z" fill="url(#mobileGold)" stroke="#ffffff" stroke-width="2.4" stroke-linejoin="round"/>
    <text x="80" y="84" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="45" font-weight="900" letter-spacing="0">SK</text>
    <text x="80" y="108" text-anchor="middle" fill="#ffc107" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="1.6">SAFETY</text>
  </g>
  <text x="80" y="145" text-anchor="middle" fill="#08275a" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="1.2">INVISIBLE GRILLS</text>
</svg>
